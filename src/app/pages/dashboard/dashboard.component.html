<section class="admin-dash">
  <header class="dash-top card card-cut rounded-4 border-0 shadow-sm">
    <div>
      <h2>Dashboard Administrateur</h2>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-success" type="button" (click)="seedPlatformData()" [disabled]="seedLoading">
        {{ seedLoading ? 'Remplissage en cours...' : 'Remplir le site (bulk)' }}
      </button>
      <button class="btn btn-outline-secondary" type="button" (click)="refresh()">Actualiser</button>
      <a class="btn btn-primary" routerLink="/home">Retour vitrine</a>
    </div>
  </header>

  <div *ngIf="seedMessage" class="alert alert-success">{{ seedMessage }}</div>
  <div *ngIf="seedError" class="alert alert-danger">{{ seedError }}</div>
  <div *ngIf="loading" class="alert alert-secondary">Chargement du dashboard...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <section class="dash-grid">
    <article class="entity-card card card-wave rounded-4 border-0 shadow-sm" *ngFor="let c of cards">
      <div class="entity-head">
        <h3>{{ c.label }}</h3>
        <span class="badge-count">{{ c.count }}</span>
      </div>
      <div class="entity-actions">
        <a class="btn btn-outline-secondary btn-sm" [routerLink]="c.list">Consulter</a>
        <a class="btn btn-primary btn-sm" [routerLink]="c.create">Ajouter</a>
      </div>
    </article>
  </section>

  <section class="entity-card orders-panel card card-tilt rounded-4 border-0 shadow-sm">
    <h3>Commandes recentes</h3>
    <table class="table table-sm">
      <thead><tr><th>ID</th><th>Date</th><th>Statut</th><th></th></tr></thead>
      <tbody>
        <tr *ngFor="let o of recentOrders">
          <td>#{{ o.id }}</td>
          <td>{{ o.orderDate || '-' }}</td>
          <td>{{ o.status || '-' }}</td>
          <td><a class="btn btn-outline-secondary btn-sm" [routerLink]="['/admin/orders/edit', o.id]">Modifier</a></td>
        </tr>
      </tbody>
    </table>
  </section>
</section>
