<div class="card p-4">
  <h3 class="mb-3">Modifier sous-catégorie</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input class="form-control" formControlName="name" />
    </div>
    <div class="mb-3">
      <label class="form-label">Category Id</label>
      <input class="form-control" formControlName="categoryId" type="number" />
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Enregistrer</button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset()">Annuler</button>
    </div>
  </form>
  <div *ngIf="message" class="alert alert-success mt-3">{{message}}</div>
  <div *ngIf="error" class="alert alert-danger mt-3">{{error}}</div>
</div>
