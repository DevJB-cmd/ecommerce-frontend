<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Sous-categories</h3>
    <a class="btn btn-sm btn-primary" [routerLink]="['/admin','subcategories','create']">Ajouter</a>
  </div>
  <table class="table table-striped">
    <thead>
      <tr><th>Id</th><th>Nom</th><th>Categorie</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of items">
        <td>{{s.id}}</td>
        <td>{{s.name}}</td>
        <td>{{s.category?.name || s.category?.id}}</td>
        <td>
          <button class="btn btn-sm btn-outline-secondary me-1" [routerLink]="['/admin','subcategories','edit', s.id]">Modifier</button>
          <button class="btn btn-sm btn-danger" (click)="deleteOne(s.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
