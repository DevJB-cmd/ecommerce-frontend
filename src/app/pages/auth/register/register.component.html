<div class="auth-card">
  <h2>Inscription</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>Prénom<input formControlName="firstName" /></label>
    <label>Nom<input formControlName="lastName" /></label>
    <label>Adresse e-mail<input formControlName="email" type="email" /></label>
    <label>Mot de passe<input formControlName="password" type="password" /></label>
    <div class="actions">
      <button class="btn" type="submit" [disabled]="loading">S'inscrire</button>
      <a routerLink="/auth/login" class="link">Déjà un compte ?</a>
    </div>
  </form>
  <div *ngIf="error" class="error">{{error}}</div>
</div>
