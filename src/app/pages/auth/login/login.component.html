<div class="auth-card">
  <h2>Connexion</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>Adresse e-mail<input formControlName="email" type="email" /></label>
    <label>Mot de passe<input formControlName="password" type="password" /></label>
    <div class="actions">
      <button class="btn" type="submit" [disabled]="loading">Se connecter</button>
      <a routerLink="/auth/register" class="link">S'inscrire</a>
    </div>
  </form>
  <div *ngIf="error" class="error">{{error}}</div>
</div>
