<div class="list">
  <div class="list-header">
    <div class="d-flex justify-content-between align-items-center">
      <h2>Produits</h2>
      <div>
        <a *ngIf="auth.isAdmin()" class="btn btn-primary" [routerLink]="['/admin','products','create']">Nouveau produit</a>
      </div>
    </div>
    <div class="search-row mt-2">
      <input class="form-control" placeholder="Rechercher" [(ngModel)]="query" />
      <button class="btn btn-secondary" (click)="search()">Rechercher</button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Chargement...</div>
  <div *ngIf="message" class="success">{{message}}</div>
  <div *ngIf="error" class="error">{{error}}</div>

  <table class="product-table" *ngIf="!loading">
    <thead>
      <tr>
        <th>ID</th>
        <th>Photo</th>
        <th>Nom</th>
        <th>Prix</th>
        <th>Quantite</th>
        <th>Fournisseur</th>
        <th>Sous-categorie</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td class="id">{{p.id}}</td>
        <td>
          <img *ngIf="photo(p.id)" class="entity-photo-thumb" [src]="photo(p.id)!" alt="photo produit" />
          <span *ngIf="!photo(p.id)">-</span>
        </td>
        <td>{{p.name}}</td>
        <td class="price">{{p.price | number:'1.2-2'}} EUR</td>
        <td class="stock">{{p.quantity}}</td>
        <td>{{p.provider?.companyName || '-'}}</td>
        <td>{{p.subCategory?.name || '-'}}</td>
        <td class="actions">
          <button *ngIf="auth.isAdmin()" class="btn" (click)="onEdit(p.id)">Modifier</button>
          <button *ngIf="auth.isAdmin()" class="btn btn-danger" (click)="deleteOne(p.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
