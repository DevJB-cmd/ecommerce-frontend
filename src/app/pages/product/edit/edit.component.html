<div class="edit">
  <h2>Modifier produit</h2>
  <form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <div class="edit">
      <h2>Modifier produit</h2>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <div class="row">
          <div class="field">
            <label>Nom</label>
            <input formControlName="name" />
          </div>
          <div class="field">
            <label>Prix (€)</label>
            <input type="number" formControlName="price" />
          </div>
        </div>

        <div class="field">
          <label>Description</label>
          <textarea formControlName="description"></textarea>
        </div>

        <div class="row">
          <div class="field">
            <label>Stock</label>
            <input type="number" formControlName="stock" />
          </div>
          <div class="field">
            <label>Image URL</label>
            <input formControlName="imageUrl" />
          </div>
        </div>

        <div class="form-actions">
          <button class="btn" type="submit" [disabled]="loading">Mettre à jour</button>
          <button class="btn btn-secondary" type="button" (click)="form.reset()">Annuler</button>
        </div>
      </form>

      <div *ngIf="message" class="success">{{message}}</div>
      <div *ngIf="error" class="error">{{error}}</div>
    </div>
    <div>
      <label>Description</label>
      <textarea formControlName="description"></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>Stock</label>
        <input type="number" formControlName="stock" />
      </div>
      <div class="field">
        <label>Image URL</label>
        <input formControlName="imageUrl" />
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" type="submit" [disabled]="loading">Mettre à jour</button>
      <button class="btn btn-secondary" type="button" (click)="form.reset()">Annuler</button>
    </div>
  </form>

  <div *ngIf="message" class="success">{{message}}</div>
  <div *ngIf="error" class="error">{{error}}</div>
</div>
