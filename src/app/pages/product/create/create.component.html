<div class="card p-4">
  <h2 class="mb-3">Creer un produit</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Nom</label>
        <input class="form-control" formControlName="name" />
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Prix</label>
        <input class="form-control" type="number" formControlName="price" />
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Quantite</label>
        <input class="form-control" type="number" formControlName="quantity" />
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Fournisseur</label>
        <select class="form-select" formControlName="providerId">
          <option [ngValue]="null">Selectionner</option>
          <option *ngFor="let p of providers" [ngValue]="p.id">{{ p.companyName }}</option>
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Sous-categorie</label>
        <select class="form-select" formControlName="subCategoryId">
          <option [ngValue]="null">Selectionner</option>
          <option *ngFor="let s of subCategories" [ngValue]="s.id">{{ s.name }}</option>
        </select>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Enregistrer</button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset()">Reinitialiser</button>
    </div>
  </form>

  <div *ngIf="message" class="alert alert-success mt-3">{{ message }}</div>
  <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
</div>
