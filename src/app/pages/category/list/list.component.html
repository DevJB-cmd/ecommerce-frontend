<div>
  <div class="list-header-row">
    <div class="d-flex justify-content-between align-items-center">
      <h3>Catégories</h3>
      <div>
        <a *ngIf="auth.isAdmin()" class="btn btn-primary" [routerLink]="['/admin','categories','create']">Nouvelle catégorie</a>
      </div>
    </div>
    <div class="search-row mt-2 d-flex">
      <input class="form-control me-2" placeholder="Rechercher" [(ngModel)]="query" />
      <button class="btn btn-secondary" (click)="search()">Rechercher</button>
    </div>
  </div>
  <div *ngIf="loading">Chargement...</div>
  <div *ngIf="error" class="error">{{error}}</div>
  <table *ngIf="!loading">
    <tr>
      <th>Id</th>
      <th>Catégories</th>
      <th>Actions</th>
    </tr>
      <tr *ngFor="let c of items">
      <td>{{c.id}}</td><td>{{c.name}}</td>
      <td>
        <a *ngIf="auth.isAdmin()" class="btn btn-sm" [routerLink]="['/admin','categories','edit', c.id]">Modifier</a>
        <button *ngIf="auth.isAdmin()" class="btn btn-sm btn-danger" (click)="deleteOne(c.id)">Supprimer</button>
      </td>
    </tr>
  </table>
</div>
