<div class="card p-4">
  <h3 class="mb-3">Creer un fournisseur</h3>
  <div *ngIf="error" class="alert alert-danger">{{error}}</div>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3"><label class="form-label">Societe</label><input class="form-control" formControlName="companyName" /></div>
    <div class="mb-3"><label class="form-label">Telephone</label><input class="form-control" formControlName="phone" /></div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label">Photo (URL facultative)</label><input class="form-control" formControlName="photoUrl" placeholder="https://..." /></div>
      <div class="col-md-6 mb-3"><label class="form-label">Ou importer une photo</label><input class="form-control" type="file" accept="image/*" (change)="onPhotoFileSelected($event)" /></div>
    </div>
    <div *ngIf="photoPreview || form.value.photoUrl" class="mb-3">
      <img class="entity-photo-preview" [src]="photoPreview || form.value.photoUrl" alt="Apercu photo fournisseur" />
      <button type="button" class="btn btn-sm btn-outline-secondary ms-2" (click)="clearPhoto()">Retirer</button>
    </div>
    <div *ngIf="photoError" class="alert alert-warning py-2">{{ photoError }}</div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Enregistrer</button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset()">Reinitialiser</button>
    </div>
  </form>
  <div *ngIf="message" class="alert alert-success mt-3">{{message}}</div>
</div>
