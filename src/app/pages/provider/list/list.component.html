<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Fournisseurs</h3>
    <a class="btn btn-sm btn-primary" [routerLink]="['/admin','providers','create']">Ajouter</a>
  </div>
  <div *ngIf="error" class="alert alert-danger">{{error}}</div>
  <table class="table table-striped" *ngIf="items.length">
    <thead>
      <tr><th>ID</th><th>Photo</th><th>Societe</th><th>Telephone</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of items">
        <td>{{p.id}}</td>
        <td>
          <img *ngIf="photo(p.id)" class="entity-photo-thumb" [src]="photo(p.id)!" alt="photo fournisseur" />
          <span *ngIf="!photo(p.id)">-</span>
        </td>
        <td>{{p.companyName}}</td>
        <td>{{p.phone}}</td>
        <td>
          <a class="btn btn-sm btn-outline-secondary me-1" [routerLink]="['/admin','providers','details', p.id]">Details</a>
          <a class="btn btn-sm btn-outline-secondary me-1" [routerLink]="['/admin','providers','edit', p.id]">Modifier</a>
          <button class="btn btn-sm btn-danger" (click)="deleteOne(p.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="!items.length" class="alert alert-secondary">Aucun fournisseur</div>
</div>
