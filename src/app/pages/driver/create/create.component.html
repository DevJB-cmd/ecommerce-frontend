<div class="card p-4">
  <h3 class="mb-3">Nouveau chauffeur</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3"><label class="form-label">Numero permis</label><input class="form-control" formControlName="licenseNumber" /></div>
    <div class="mb-3">
      <label class="form-label">Utilisateur</label>
      <select class="form-select" formControlName="userId">
        <option [ngValue]="null">Selectionner</option>
        <option *ngFor="let u of users" [ngValue]="u.id">{{u.firstName}} {{u.lastName}} ({{u.phone}})</option>
      </select>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label">Photo (URL facultative)</label><input class="form-control" formControlName="photoUrl" placeholder="https://..." /></div>
      <div class="col-md-6 mb-3"><label class="form-label">Ou importer une photo</label><input class="form-control" type="file" accept="image/*" (change)="onPhotoFileSelected($event)" /></div>
    </div>
    <div *ngIf="photoPreview || form.value.photoUrl" class="mb-3">
      <img class="entity-photo-preview" [src]="photoPreview || form.value.photoUrl" alt="Apercu photo chauffeur" />
      <button type="button" class="btn btn-sm btn-outline-secondary ms-2" (click)="clearPhoto()">Retirer</button>
    </div>
    <div *ngIf="photoError" class="alert alert-warning py-2">{{ photoError }}</div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Creer</button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset()">Reinitialiser</button>
    </div>
  </form>
  <div *ngIf="message" class="alert alert-success mt-3">{{message}}</div>
  <div *ngIf="error" class="alert alert-danger mt-3">{{error}}</div>
</div>
