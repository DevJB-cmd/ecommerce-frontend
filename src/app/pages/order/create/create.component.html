<div class="card p-4">
  <h3 class="mb-3">Nouvelle commande</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Date</label>
        <input class="form-control" formControlName="date" type="date" />
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Total</label>
        <input class="form-control" formControlName="total" type="number" />
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Statut</label>
        <input class="form-control" formControlName="status" />
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Créer</button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset()">Réinitialiser</button>
    </div>
  </form>
  <div *ngIf="message" class="alert alert-success mt-3">{{message}}</div>
  <div *ngIf="error" class="alert alert-danger mt-3">{{error}}</div>
</div>
