<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Commandes récentes</h3>
    <a class="btn btn-sm btn-primary" routerLink="/orders/create">Nouvelle commande</a>
  </div>
  <div *ngIf="loading">Chargement...</div>
  <table class="table table-hover" *ngIf="!loading">
    <thead>
      <tr><th>Id</th><th>Date</th><th>Total</th><th>Statut</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let o of items">
        <td>{{o.id}}</td>
        <td>{{o.date}}</td>
        <td>{{o.total | number:'1.2-2'}}</td>
        <td>{{o.status}}</td>
        <td>
          <a class="btn btn-sm btn-outline-secondary me-1">Voir</a>
          <button class="btn btn-sm btn-danger" (click)="deleteOne(o.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
