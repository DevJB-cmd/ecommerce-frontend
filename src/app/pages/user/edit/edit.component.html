<div class="card p-4">
  <h3 class="mb-3">Modifier utilisateur</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label">Prenom</label><input class="form-control" formControlName="firstName" /></div>
      <div class="col-md-6 mb-3"><label class="form-label">Nom</label><input class="form-control" formControlName="lastName" /></div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label">Username</label><input class="form-control" formControlName="username" /></div>
      <div class="col-md-6 mb-3"><label class="form-label">Telephone</label><input class="form-control" formControlName="phone" /></div>
    </div>
    <div class="mb-3"><label class="form-label">Email</label><input class="form-control" formControlName="email" /></div>
    <div class="mb-3"><label class="form-label">Role</label><select class="form-select" formControlName="role"><option value="USER">Utilisateur</option><option value="ADMIN">Admin</option></select></div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label">Photo (URL facultative)</label><input class="form-control" formControlName="photoUrl" placeholder="https://..." /></div>
      <div class="col-md-6 mb-3"><label class="form-label">Ou importer une photo</label><input class="form-control" type="file" accept="image/*" (change)="onPhotoFileSelected($event)" /></div>
    </div>
    <div *ngIf="photoPreview || form.value.photoUrl" class="mb-3">
      <img class="entity-photo-preview" [src]="photoPreview || form.value.photoUrl" alt="Apercu photo utilisateur" />
      <button type="button" class="btn btn-sm btn-outline-secondary ms-2" (click)="clearPhoto()">Retirer</button>
    </div>
    <div *ngIf="photoError" class="alert alert-warning py-2">{{ photoError }}</div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Enregistrer</button>
      <button class="btn btn-outline-secondary" type="button" (click)="form.reset()">Annuler</button>
    </div>
  </form>
  <div *ngIf="message" class="alert alert-success mt-3">{{message}}</div>
  <div *ngIf="error" class="alert alert-danger mt-3">{{error}}</div>
</div>
