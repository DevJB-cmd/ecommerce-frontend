<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Utilisateurs</h3>
    <a class="btn btn-sm btn-primary" [routerLink]="['/admin','users','create']">Ajouter</a>
  </div>
  <div *ngIf="loading" class="mb-3">Chargement...</div>
  <div *ngIf="error" class="alert alert-danger">{{error}}</div>
  <table class="table table-hover">
    <thead>
      <tr><th>ID</th><th>Photo</th><th>Nom</th><th>Email</th><th>Roles</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of items">
        <td>{{u.id}}</td>
        <td>
          <img *ngIf="photo(u.id)" class="entity-photo-thumb" [src]="photo(u.id)!" alt="photo utilisateur" />
          <span *ngIf="!photo(u.id)">-</span>
        </td>
        <td>{{u.firstName || u.email}} {{u.lastName || ''}}</td>
        <td>{{u.email}}</td>
        <td>{{u.roles?.join(', ')}}</td>
        <td>
          <a class="btn btn-sm btn-outline-secondary me-1" [routerLink]="['/admin','users','details', u.id]">Details</a>
          <a class="btn btn-sm btn-outline-secondary me-1" [routerLink]="['/admin','users','edit', u.id]">Modifier</a>
          <button class="btn btn-sm btn-danger" (click)="deleteOne(u.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
