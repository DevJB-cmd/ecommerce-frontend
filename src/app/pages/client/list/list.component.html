<div>
  <h3>Clients</h3>
  <table>
    <tr><th>Id</th><th>Nom</th><th>Email</th><th>Téléphone</th><th>Actions</th></tr>
    <tr *ngFor="let c of items">
      <td>{{c.id}}</td><td>{{c.name}}</td><td>{{c.email}}</td><td>{{c.phone}}</td>
      <td><button>Modifier</button> <button (click)="deleteOne(c.id)">Supprimer</button></td>
    </tr>
  </table>
  <div *ngIf="error" class="error">{{error}}</div>
</div>
